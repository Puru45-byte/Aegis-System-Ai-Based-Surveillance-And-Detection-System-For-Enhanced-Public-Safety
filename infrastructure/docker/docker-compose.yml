version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: aegis_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - aegis_pgdata:/var/lib/postgresql/data
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aegis"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aegis_pgdata:
